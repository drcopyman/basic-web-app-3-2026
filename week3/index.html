<!DOCTYPE html>
<html>
<header>
    <title>เรียนสัปดาห์ที่ 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</header>

<body>
    <div>
        <h1>บทเรียนเรื่อง Input</h1>
        <p id="show-text">ข้อความที่อ่านได้: </p>
        <input type="text" placeholder="กรอกสิ" id="text-input">
        <button id="read-text" onclick="readText()">กดเพื่ออ่าน</button>

        <h1>บทเรียนเรื่อง Select</h1>
        <select id="select-text">
            <option value="-" disabled selected>กรุณาเลือก</option>
            <option value="A">ตัวเลือก A</option>
            <option value="B">ตัวเลือก B</option>
            <option value="C">ตัวเลือก C</option>
            <option value="D">ตัวเลือก D</option>
        </select>

        <h1>Select สุ่ม meme</h1>
        <select id="select-meme">
            <option value="-" disabled selected>กรุณาเลือก</option>
            <option value="https://media.tenor.com/QVwrxFqsrbsAAAAM/he-like-hee-huge.gif">ตัวเลือก A</option>
            <option
                value="https://thethaiger.com/th/wp-content/uploads/2025/12/%E0%B9%80%E0%B8%AD%E0%B9%87%E0%B8%A1%E0%B8%AD%E0%B8%AD%E0%B8%99%E0%B8%B4%E0%B8%A7%E0%B8%A3%E0%B8%B1%E0%B8%87%E0%B8%AA%E0%B8%B4%E0%B8%95-%E0%B8%AA%E0%B8%81%E0%B8%B4%E0%B8%99-4.jpg">
                ตัวเลือก B</option>
            <option value="https://www.gifcen.com/wp-content/uploads/2021/03/memes-gif-2.gif">ตัวเลือก C</option>
            <option value="https://gifcop.com/wp-content/uploads/crying-crying-meme.gif">ตัวเลือก D</option>
        </select>
        <div>
            <img id="show-meme"
                src="https://wegotthiscovered.com/wp-content/uploads/2024/02/sad-hamster-tiktok.png?resize=564">
        </div>

    </div>
    <script>
        function readText() {
            const textInput = document.getElementById('text-input')
            const msg = textInput.value
            const showText = document.getElementById('show-text')
            showText.innerText = "ข้อความที่อ่านได้: " + msg
        }

        const textInput = document.getElementById('text-input')
        textInput.addEventListener("change", function () {
            alert(this.value)
        })

        const selectText = document.getElementById('select-text')
        selectText.addEventListener('change', function () {
            if (this.value === "D") {
                alert("เลือกได้ ดี มากกกก")
            } else {
                alert("เลือกได้ ***** มาก")
            }
        })

        const selectMeme = document.getElementById('select-meme')
        const showMeme = document.getElementById('show-meme')
        selectMeme.addEventListener("change", function () {
            showMeme.src = this.value
        })

    </script>
</body>

</html>
